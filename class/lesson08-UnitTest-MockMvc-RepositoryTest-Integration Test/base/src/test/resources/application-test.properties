spring.config.import=

spring.datasource.url=jdbc:h2:mem:lesson8_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=USER
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

jwt.secret=lesson8-test-secret-key-lesson8-test-secret-key
jwt.access.expiration_time=3600000
jwt.refresh.expiration_time=259200000

app.admin.username=admin-test
app.admin.email=admin-test@example.com
app.admin.password=AdminTest123
app.admin.firstName=Admin
app.admin.lastName=Test

security.public-endpoints=/api/v1/auth/**,/swagger-ui/**,/v3/api-docs/**,/swagger-ui.html
security.user-endpoints=/api/v1/user/**,/swagger-ui/**,/v3/api-docs/**,/swagger-ui.html
security.admin-endpoints=/api/v1/admin/**,/swagger-ui/**,/v3/api-docs/**,/swagger-ui.html
security.swagger-endpoints=/swagger-ui/**,/v3/api-docs/**,/swagger-ui.html

logging.level.org.springframework.security=ERROR
