spring.application.name=crudrevise
# === Database Connection ===
# Port 3306 vŕ database hit_springboot b?n v?a t?o trong DBeaver
spring.datasource.url=jdbc:mysql://localhost:3306/hit_springboot?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
# Driver nŕy lŕ chu?n cho MySQL 8.x
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# === JPA / Hibernate ===
# 'update' giúp t? ??ng t?o b?ng d?a tręn Entity c?a b?n mŕ không xóa d? li?u c?
spring.jpa.hibernate.ddl-auto=update
# Hi?n câu l?nh SQL ra console ?? b?n d? debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true